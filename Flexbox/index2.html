<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;  /* vertical centering */
            align-items: center;      /* horizontal centering */
            height: 100vh;            /* needed to see vertical centering */
        }
    </style>
</head>
<body>

    <h1>How to center everything horizontally</h1>
    (in a column Layout)
    <button>Learn More</button>
    <h1>Example Heading</h1>
    <button>Button</button>
    
</body>
</html>

<!-- 
Justify-content : Aligns items along the main axis(horizontal axis in a row direction). take a way : it work only if the flex-direction: row
Align-items: Aligns items along the cross axis(Vertical axis in a row direction)

Then in Flexbox:
    - Main axis -> Controlled by flex-direction
    - Justify-content- works on the main axis
    - Align-items -> works on the cross axis
    But when the flex-direction : colomn, the axes changeM
        main axis : Verticle
        cross axis : Horizontal




-->
