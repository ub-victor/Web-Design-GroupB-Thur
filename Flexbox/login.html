<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login-form</title>
    <style>
        body{
            justify-items: center;
            background-color: #c8c8e0;
        }
        .container{
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;  
            margin-top: 40px;
            border-radius: 10px;
            width: 300px;
            height: 300px;
            background-color: #23233b;
            box-shadow: 10px 10px 70px 20px #beee10;
            transition: ease-in-out 2s;

        }
        .container:hover{
             box-shadow: 10px 10px 70px 20px #354464;
             transition: ease-in-out 4s;
        }
        .welcomeText{
            padding: 0;
            margin: 0;
            text-align: center;
            color: #eee;
            
        }
        .email, .pass{
            height: 38px;
            outline: none;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            padding-left: 10px;
        }
        .btn{
            height: 38px;
            font-size: 15px;
            background-color: #fffb16;
            border-radius: 5px;
            border: none;
            color: #23233b;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover{
            background-color: #23233b;
            color: white;
            border: #eee solid 2px;
            transition: 3s;
        }
        .signUpText{
            padding: 0;
            margin: 0;
            text-align: center;
        }
        .signUptext1{
            color: #eee;            
        }
        .signUptext2{
           color: #fffb16;
           font-weight: bold;
           cursor: pointer;
        }
    </style>
</head>
<body >
    <div class="container">
        <h2 class="welcomeText">welcome back 🙋</h2>
        <input type="email" placeholder="enter your email" class="email">
        <input type="password" placeholder="enter your password" class="pass">
        <button class="btn">Login</button>
         <p class="signUpText">
          <span class="signUptext1">Don't you have an account?</span>
          <span class="signUptext2">Sign Up</span>
        </p>

    </div>
</body>
</html>
